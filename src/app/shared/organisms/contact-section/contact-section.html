<div class="contact-section">
  <app-contact-hero />

  <section class="contact-section__cards" aria-label="Información de contacto">
    @for (card of contactCards; track card.title) {
      <app-contact-info-card [info]="card" appScrollReveal="fade-up" [delay]="$index + 1" />
    }
  </section>

  <div class="contact-section__map" appScrollReveal="fade-up">
    <app-contact-map />
  </div>
</div>
