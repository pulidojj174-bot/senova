<article
  class="project-card"
  [class.project-card--reverse]="reverse()"
  [attr.aria-labelledby]="'project-' + project().id + '-title'"
  appScrollReveal="fade-up"
>
  <!-- Image Compare -->
  <div class="project-card__compare" appScrollReveal="zoom-in" [delay]="1">
    <div class="project-card__compare-labels">
      <span class="project-card__label project-card__label--before">Antes</span>
      <span class="project-card__label project-card__label--after">Después</span>
    </div>
    <p-imagecompare class="project-card__image-compare" aria-label="Comparar antes y después">
      <ng-template #left>
        <img [src]="project().beforeImage" [alt]="project().beforeAlt" />
      </ng-template>
      <ng-template #right>
        <img [src]="project().afterImage" [alt]="project().afterAlt" />
      </ng-template>
    </p-imagecompare>
  </div>

  <!-- Info -->
  <div class="project-card__info">
    <div class="project-card__icon-wrapper" appScrollReveal="zoom-in" [delay]="1">
      <span class="project-card__icon" aria-hidden="true">{{ project().icon }}</span>
    </div>
    <h3 [id]="'project-' + project().id + '-title'" class="project-card__title" appScrollReveal="fade-up" [delay]="2">
      {{ project().title }}
    </h3>
    <p class="project-card__description" appScrollReveal="fade-up" [delay]="3">
      {{ project().description }}
    </p>
    <ul class="project-card__features" role="list">
      @for (feature of project().features; track feature) {
        <li class="project-card__feature" appScrollReveal="fade-left" [delay]="$index + 3">
          <svg class="project-card__check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          {{ feature }}
        </li>
      }
    </ul>
  </div>
</article>
