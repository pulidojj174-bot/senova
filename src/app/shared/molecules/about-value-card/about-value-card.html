<article class="about-value-card">
  <div class="about-value-card__icon-wrapper" aria-hidden="true">
    <svg class="about-value-card__icon" viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
      <path [attr.d]="card().icon" />
    </svg>
  </div>
  <h3 class="about-value-card__title">{{ card().title }}</h3>
  <p class="about-value-card__description">{{ card().description }}</p>
</article>
