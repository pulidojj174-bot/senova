<section class="home-content" aria-labelledby="home-content-title">
  <h2 id="home-content-title" class="home-content__title" appScrollReveal="fade-up">
    {{ title() }}
  </h2>
  <p class="home-content__subtitle" appScrollReveal="fade-up" [delay]="1">
    {{ subtitle() }}
  </p>

  <div class="home-content__grid">
    @for (item of items(); track item.title) {
      <div class="home-content__card" appScrollReveal="zoom-in" [delay]="$index + 1">
        <div class="home-content__image-wrapper">
          <img
            [ngSrc]="item.image"
            [alt]="item.alt"
            width="400"
            height="400"
            class="home-content__image"
          />
          <!-- Play icon for video items -->
          @if (item.tag === 'Video' || item.tag === 'Reel') {
            <div class="home-content__play" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
                <polygon points="5 3 19 12 5 21" />
              </svg>
            </div>
          }
        </div>
        <div class="home-content__info">
          <span class="home-content__tag">{{ item.tag }}</span>
          <p class="home-content__card-title">{{ item.title }}</p>
        </div>
      </div>
    }
  </div>
</section>
