<section class="home-value" aria-labelledby="home-value-title">
  <h2 id="home-value-title" class="home-value__title" appScrollReveal="fade-up">
    {{ title() }}
  </h2>

  <div class="home-value__grid">
    @for (item of items(); track item.title) {
      <div class="home-value__card" appScrollReveal="fade-up" [delay]="$index + 1">
        <span class="home-value__icon" aria-hidden="true">{{ item.icon }}</span>
        <h3 class="home-value__card-title">{{ item.title }}</h3>
        <p class="home-value__card-text">{{ item.description }}</p>
      </div>
    }
  </div>
</section>
